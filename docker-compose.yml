version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: imbass_postgres
    restart: always
    environment:
      POSTGRES_USER: imbass
      POSTGRES_PASSWORD: imbass123
      POSTGRES_DB: imbass
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
